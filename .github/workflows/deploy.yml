name: Deploy — Produção

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy no servidor
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Rebuild e restart dos containers
        id: deploy
        working-directory: /home/matheusdev/Fut-conversys
        run: bash deploy.sh

      - name: Notificar sucesso por e-mail
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Deploy concluído — Fut Conversys"
          to: redacted@example.com
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Deploy realizado com sucesso no servidor conversysfut.

            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}
            Hora        : ${{ github.event.head_commit.timestamp }}

            Acesse: http://<REDACTED-IP>

      - name: Notificar falha por e-mail
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ FALHA no deploy — Fut Conversys"
          to: redacted@example.com
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            O deploy FALHOU no servidor conversysfut.

            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}

            Veja os logs em: https://github.com/${{ github.repository }}/actions
