name: Deploy — Produção

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Runner self-hosted no mesmo servidor: evita dois deploy.sh ao mesmo tempo
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy no servidor
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Rebuild e restart dos containers
        id: deploy
        working-directory: /home/matheusdev/Fut-conversys
        run: |
          set +e
          bash deploy.sh 2>&1 | tee deploy.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # Anotação de erro na UI do GitHub (aparece no topo da run e no PR)
          if [ "$code" != "0" ]; then
            first_error=$(grep -iE "error|failed|fatal" deploy.log | head -1 | cut -c1-180)
            echo "::error title=Deploy falhou (exit $code)::${first_error:-veja o resumo e o artifact deploy-log}"
          fi
          exit $code

      # Resumo bonito da run (aba Summary do GitHub): status, commit e, em caso de
      # falha, os erros extraídos do log + log completo dobrável.
      - name: Resumo do deploy (Summary)
        if: always()
        working-directory: /home/matheusdev/Fut-conversys
        run: |
          STATUS="${{ steps.deploy.outcome }}"
          {
            if [ "$STATUS" = "success" ]; then
              echo "# ✅ Deploy concluído — produção atualizada"
            else
              echo "# ❌ Deploy FALHOU — o site segue no ar na versão anterior (build-first)"
            fi
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Commit** | \`$(git rev-parse --short HEAD)\` — $(git log -1 --pretty=%s | head -c 100) |"
            echo "| **Autor** | $(git log -1 --pretty=%an) |"
            echo "| **Branch** | ${GITHUB_REF_NAME} |"
            echo "| **Quando** | $(date -u '+%d/%m/%Y %H:%M UTC') |"
            echo "| **App** | https://fut.conversys.global:9443/bolao |"
            echo ""
            if [ "$STATUS" != "success" ]; then
              echo "## 🔍 Erros encontrados no log"
              echo '```'
              grep -inE "error|failed|fatal|exit code" deploy.log | tail -20 || echo "(nenhuma linha de erro óbvia — veja o log completo abaixo)"
              echo '```'
              echo ""
              echo "<details><summary>📜 Últimas 80 linhas do log completo</summary>"
              echo ""
              echo '```'
              tail -80 deploy.log
              echo '```'
              echo "</details>"
              echo ""
              echo "> 📎 Log completo anexado como artifact **deploy-log** nesta run."
            else
              echo "## 🩺 Saúde pós-deploy"
              echo '```'
              tail -12 deploy.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Anexar log do deploy (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-run-${{ github.run_number }}
          path: /home/matheusdev/Fut-conversys/deploy.log
          retention-days: 14
          if-no-files-found: warn

      - name: Resolver destinatário do e-mail
        id: mailto
        if: always()
        run: |
          TO="${{ secrets.NOTIFY_EMAIL }}"
          if [ -z "$TO" ]; then TO="admin@example.com"; fi
          if [ -z "$TO" ]; then TO="${{ secrets.MAIL_USERNAME }}"; fi
          echo "to=$TO" >> "$GITHUB_OUTPUT"

      - name: Montar HTML do e-mail
        if: always()
        working-directory: /home/matheusdev/Fut-conversys
        env:
          DEPLOY_STATUS: ${{ steps.deploy.outcome == 'success' && 'success' || 'failure' }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          APP_URL: https://fut.conversys.global:9443/bolao
          ERROR_LOG_FILE: deploy.log
          OUTPUT_FILE: deploy-email.html
        run: |
          MSG=$(git log -1 --pretty=%B | head -1)
          export COMMIT_MESSAGE="${MSG:-Deploy manual}"
          export COMMIT_SHORT="$(git rev-parse --short HEAD)"
          export TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"
          python3 .github/scripts/build-deploy-email.py

      - name: Notificar sucesso por e-mail
        if: success() && steps.mailto.outputs.to != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Deploy bolão — Fut Conversys"
          to: ${{ steps.mailto.outputs.to }}
          from: "Fut Conversys Deploy <${{ secrets.MAIL_USERNAME }}>"
          html_body: file:///home/matheusdev/Fut-conversys/deploy-email.html
          convert_markdown: false

      - name: Notificar falha por e-mail
        if: failure() && steps.mailto.outputs.to != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Falha deploy bolão — Fut Conversys"
          to: ${{ steps.mailto.outputs.to }}
          from: "Fut Conversys Deploy <${{ secrets.MAIL_USERNAME }}>"
          html_body: file:///home/matheusdev/Fut-conversys/deploy-email.html
          convert_markdown: false
