worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend_api {
        server backend:8000;
        keepalive 32;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options          "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options   "nosniff"                       always;
        add_header X-XSS-Protection         "1; mode=block"                 always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;

        location = /api/session/login {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://frontend;
            include /etc/nginx/includes/proxy.conf;
        }

        location = /api/session/register {
            limit_req zone=auth burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://frontend;
            include /etc/nginx/includes/proxy.conf;
        }

        # Avatares/banners: direto no backend, sem passar pelo Next (binário + cache)
        location ~ ^/api/backend/(api/users/[0-9]+/(?:avatar|banner))$ {
            proxy_pass http://backend_api/$1$is_args$args;
            include /etc/nginx/includes/proxy.conf;
        }

        location /_next/static/ {
            proxy_pass http://frontend;
            include /etc/nginx/includes/proxy.conf;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location /public/ {
            proxy_pass http://frontend;
            include /etc/nginx/includes/proxy.conf;
            add_header Cache-Control "public, max-age=86400" always;
        }

        location / {
            proxy_pass http://frontend;
            include /etc/nginx/includes/proxy.conf;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
